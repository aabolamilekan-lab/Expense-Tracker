<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💰 SpendWise</h1>
      <span class="greeting" id="greeting"></span>
    </div>

    <div class="form">
      <input id="nameInput" type="text" placeholder="Expense name (e.g., Transport)" />
      <input id="amountInput" type="number" placeholder="Amount (₦)" min="0" />
      <button id="addBtn">Add Expense</button>
    </div>

    <div class="summary">
      <span>Total: <strong id="totalDisplay">₦0.00</strong></span>
      <span>Items: <strong id="countDisplay">0</strong></span>
    </div>

    <div class="dashboard" id="dashboard">
      <div class="dashboard-card">
        <span class="card-label">Average</span>
        <span class="card-value" id="avgDisplay">₦0.00</span>
      </div>
      <div class="dashboard-card">
        <span class="card-label">Highest</span>
        <span class="card-value" id="highDisplay">₦0.00</span>
      </div>
      <div class="dashboard-card">
        <span class="card-label">Lowest</span>
        <span class="card-value" id="lowDisplay">₦0.00</span>
      </div>
    </div>

    <ul id="expenseList"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
